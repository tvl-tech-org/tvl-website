<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">

<body>
<div class="card dark" style="gap:12px">
  <div class="label-eyebrow">Badges &amp; tags</div>

    <span style="background:#FF4931;color:#fff;padding:6px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em">New</span>

    <span style="background:#1A1A1A;color:#C9C7C2;border:1px solid rgba(255,255,255,0.15);padding:5px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.14em">AI</span>
    <span style="background:#1A1A1A;color:#C9C7C2;border:1px solid rgba(255,255,255,0.15);padding:5px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.14em">Blockchain</span>
    <span style="background:#1A1A1A;color:#C9C7C2;border:1px solid rgba(255,255,255,0.15);padding:5px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.14em">VR</span>
    <span style="background:#9E2D1E;color:#fff;padding:6px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em">Live</span>
  </div>
</div>
