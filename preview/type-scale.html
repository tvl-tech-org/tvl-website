<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:wght@400;600;700&display=swap">
</head>
<body>
<div class="card dark" style="gap:6px;font-family:'Open Sans',sans-serif">
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-family:Anton;font-size:64px;line-height:1;text-transform:uppercase">H1</span><span style="color:#8A8884;font-family:JetBrains Mono,monospace;font-size:11px">88px / Anton</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-family:Anton;font-size:48px;line-height:1;text-transform:uppercase">H2</span><span style="color:#8A8884;font-family:monospace;font-size:11px">64px / Anton</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-weight:700;font-size:36px;letter-spacing:-0.02em">H3 — Open Sans Bold</span><span style="color:#8A8884;font-family:monospace;font-size:11px">36px</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-size:22px">Lead — Open Sans Regular</span><span style="color:#8A8884;font-family:monospace;font-size:11px">22px</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-size:16px">Body — Open Sans Regular</span><span style="color:#8A8884;font-family:monospace;font-size:11px">16px</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-size:14px;color:#C9C7C2">Small — Open Sans Regular</span><span style="color:#8A8884;font-family:monospace;font-size:11px">14px</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#8A8884">Caption — Open Sans Semi</span><span style="color:#8A8884;font-family:monospace;font-size:11px">12px</span></div>
</div>
</body></html>
