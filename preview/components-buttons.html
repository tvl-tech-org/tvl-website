<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@600;700&display=swap">
<style>
  .btn { font-family:'Open Sans',sans-serif;font-weight:700;font-size:14px;padding:14px 28px;text-transform:uppercase;letter-spacing:0.12em;border:none;cursor:pointer;transition:all 200ms cubic-bezier(.22,1,.36,1) }
  .btn-primary { background:#FF4931;color:#fff }
  .btn-primary:hover { background:#9E2D1E }
  .btn-secondary { background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.4) }
  .btn-ghost { background:transparent;color:#FF4931;border:1px solid #FF4931 }
</style>
</head>
<body>
<div class="card dark" style="gap:16px">
  <div class="label-eyebrow">Buttons</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-primary">Start a project</button>
    <button class="btn btn-secondary">Learn more</button>
    <button class="btn btn-ghost">Read case study</button>
  </div>
  <div style="font-family:monospace;font-size:11px;color:#8A8884">primary · secondary · ghost — square corners, wide tracking, Open Sans Bold</div>
</div>
</body></html>
