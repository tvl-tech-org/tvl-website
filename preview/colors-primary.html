<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card dark">
  <div class="row">
    <div class="swatch" style="background:#FF4931;color:#fff;flex:2">
      <div class="name">Orange</div>
      <div class="hex">#FF4931 · Pantone 171 C</div>
    </div>
    <div class="swatch" style="background:#9E2D1E;color:#fff">
      <div class="name">Orange Red</div>
      <div class="hex">#9E2D1E · 174 C</div>
    </div>
  </div>
  <div class="row">
    <div class="swatch" style="background:#000;color:#fff;border:1px solid rgba(255,255,255,0.2)">
      <div class="name">Black</div>
      <div class="hex">#000000</div>
    </div>
    <div class="swatch" style="background:#fff;color:#000">
      <div class="name">White</div>
      <div class="hex">#FFFFFF</div>
    </div>
  </div>
</div>
</body></html>
